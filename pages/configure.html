<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="../assets/favicon.png" />
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/configure.css" />
    <title>Configure</title>
  </head>
  <body>
    <main class="main-container">
      <div class="theme-container">
        <button class="button" id="theme-toggle">Theme</button>
      </div>
      <section class="main-title-container">
        <h1 class="main-title">Configure</h1>
        <section class="configure-container">
          <div class="configure-options">
            <div class="language-container">
              <label for="language-select">Language</label>
              <select id="language-select">
                <option value="en">English</option>
                <option value="es">Spanish</option>
              </select>
            </div>
          </div>
        </section>
        <section class="difficulty-container">
          <button class="button" id="easy-button">Easy</button>
          <button class="button" id="medium-button">Medium</button>
          <button class="button" id="hard-button">Hard</button>
        </section>
        <section class="cards-container" id="cards-container"></section>
        <section class="custom-text-container">
          <div class="custom-text-button-container">
            <button class="button" id="custom-text-button">
              Add custom text
            </button>
          </div>
        </section>
      </section>
      <div class="main-options-container">
        <section>
          <button class="button" id="configure-back-button">
            Back to main menu
          </button>
        </section>
      </div>
    </main>
    <script src="../js/ui.js"></script>
    <script src="../js/configure.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </body>
</html>
